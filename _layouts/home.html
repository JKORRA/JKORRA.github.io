<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a192f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  
  <!-- Hide content until model loads -->
  <style id="init-hide-style">
    .main-container { opacity: 0; pointer-events: none; }
    body { background-color: #0a192f; color: #f5f5f7; }
  </style>

  <!-- Preload model to reduce waiting time -->
  <link rel="preload" href="assets/models/avatar.glb" as="fetch" crossorigin="anonymous">
  
  {%- feed_meta -%}
</head>
<body>
  {{ content }}

</body>
</html>
